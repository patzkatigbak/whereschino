<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where's Chino?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .game-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px auto;
            max-width: 600px;
        }

        .box {
            width: 150px;
            height: 150px;
            background-color: #3498db;
            border: 4px solid #2980b9;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
            position: relative;
            overflow: hidden;
        }

        .box:hover {
            transform: scale(1.05);
            background-color: #2980b9;
        }

        .box img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            display: none; /* Hidden by default */
        }

        /* Revealed states */
        .box.revealed {
            background-color: #fff;
            cursor: default;
            pointer-events: none;
        }

        .box.revealed img {
            display: block;
        }

        #message {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            min-height: 35px;
        }

        .win-text { color: #2ecc71; }
        .lose-text { color: #e74c3c; }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>

    <h1>Where's Chino?</h1>
    <p>Click on a box to find Chino!</p>

    <div class="game-container">
        <div class="box" onclick="checkChoice(0)" id="box0">
            <img src="chino.png" alt="Chino" id="img0">
        </div>
        <div class="box" onclick="checkChoice(1)" id="box1">
            <img src="chino.png" alt="Chino" id="img1">
        </div>
        <div class="box" onclick="checkChoice(2)" id="box2">
            <img src="chino.png" alt="Chino" id="img2">
        </div>
    </div>

    <div id="message"></div>
    <button onclick="resetGame()">Play Again</button>

    <script>
        let chinoPosition;
        let gameActive = true;

        function resetGame() {
            // 1. Randomly pick a box (0, 1, or 2)
            chinoPosition = Math.floor(Math.random() * 3);
            gameActive = true;
            
            // 2. Clear messages
            document.getElementById('message').innerText = "";
            document.getElementById('message').className = "";

            // 3. Reset the boxes visually
            for (let i = 0; i < 3; i++) {
                const box = document.getElementById(`box${i}`);
                const img = document.getElementById(`img${i}`);
                
                box.classList.remove('revealed');
                
                // Set the image source. 
                // If it's Chino's position, show Chino. Otherwise, show an empty space or a "miss" image.
                if (i === chinoPosition) {
                    img.src = "chino.png"; 
                    img.alt = "Chino!";
                } else {
                    // You can replace this with an empty transparent PNG or a "wrong" icon
                    img.src = "empty.png"; 
                    img.alt = "Empty...";
                }
            }
        }

        function checkChoice(clickedIndex) {
            if (!gameActive) return; // Prevent clicking after game ends

            gameActive = false;
            const messageDiv = document.getElementById('message');

            // Reveal the clicked box
            document.getElementById(`box${clickedIndex}`).classList.add('revealed');

            if (clickedIndex === chinoPosition) {
                messageDiv.innerText = "You found Chino! 🎉 You win!";
                messageDiv.className = "win-text";
            } else {
                messageDiv.innerText = "Tragic! That box was empty. 😿";
                messageDiv.className = "lose-text";
                
                // Reveal where Chino actually was after a brief delay
                setTimeout(() => {
                    document.getElementById(`box${chinoPosition}`).classList.add('revealed');
                }, 500);
            }
        }

        // Initialize the game on page load
        resetGame();
    </script>
</body>
</html>
